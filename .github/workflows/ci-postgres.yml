name: CI — PostgreSQL migrations

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  integration-postgres:
    name: PostgreSQL migrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Restore
        run: dotnet restore SchaerbeekMunicipality.slnx

      - name: Build
        run: dotnet build SchaerbeekMunicipality.slnx --no-restore --configuration Release

      - name: Test migrations (Testcontainers)
        run: >
          dotnet test tests/SchaerbeekMunicipality.Integration.Tests
          --no-build
          --configuration Release
          --filter "Category=PostgreSQL"
          --verbosity normal
