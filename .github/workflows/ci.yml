name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same branch when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/schaerbeek-municipality-web
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: Directory.Packages.props

      # Aspire 9+ ships as NuGet packages — no workload install needed.
      - name: Restore
        run: dotnet restore SchaerbeekMunicipality.slnx

      - name: Build
        run: dotnet build SchaerbeekMunicipality.slnx --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test SchaerbeekMunicipality.slnx
          --no-build
          --configuration Release
          --verbosity normal
          --filter "Category!=E2E&Category!=PostgreSQL"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-build
          retention-days: 1
          path: |
            src/*/bin/Release/
            tests/*/bin/Release/

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pwsh tests/SchaerbeekMunicipality.E2E.Tests/bin/Release/net10.0/playwright.ps1 install chromium --with-deps

      - name: Install Playwright OS deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pwsh tests/SchaerbeekMunicipality.E2E.Tests/bin/Release/net10.0/playwright.ps1 install-deps chromium

      - name: E2E tests
        run: >
          dotnet test tests/SchaerbeekMunicipality.E2E.Tests
          --no-build
          --configuration Release
          --filter "Category=E2E"
          --verbosity normal

  publish:
    name: Build, scan & push image
    runs-on: ubuntu-latest
    needs: [build-and-test, e2e]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    outputs:
      image_sha_tag: ${{ steps.meta.outputs.version }}
      image_tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: schaerbeek-web:scan
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: schaerbeek-web:scan
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: publish
    if: >
      github.event_name != 'pull_request'
      && github.ref == 'refs/heads/main'
      && needs.publish.result == 'success'
      && vars.AZURE_DEPLOY_ENABLED == 'true'
    permissions:
      contents: read
      id-token: write

    env:
      RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'schaerbeek-rg' }}
      CONTAINER_APP_NAME: ${{ vars.AZURE_CONTAINER_APP_NAME || 'schaerbeek-web' }}

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App image
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          IMAGE_REF="ghcr.io/${{ github.repository_owner }}/schaerbeek-municipality-web:${SHORT_SHA}"
          echo "Deploying ${IMAGE_REF}"
          az containerapp update \
            --name "${CONTAINER_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --image "${IMAGE_REF}" \
            --output table
