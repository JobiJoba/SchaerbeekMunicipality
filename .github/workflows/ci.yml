name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same branch when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: Directory.Packages.props

      # Aspire 9+ ships as NuGet packages — no workload install needed.
      - name: Restore
        run: dotnet restore SchaerbeekMunicipality.slnx

      - name: Build
        run: dotnet build SchaerbeekMunicipality.slnx --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test SchaerbeekMunicipality.slnx
          --no-build
          --configuration Release
          --verbosity normal
          --filter "Category!=E2E&Category!=PostgreSQL"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-build
          retention-days: 1
          # Playwright ships driver assets under bin/.../.playwright (hidden).
          include-hidden-files: true
          path: |
            src/*/bin/Release/
            tests/*/bin/Release/

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: Directory.Packages.props

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-build

      # Artifact round-trip can drop +x on the Playwright-bundled Node binary.
      - name: Fix Playwright driver permissions
        run: chmod +x tests/SchaerbeekMunicipality.E2E.Tests/bin/Release/net10.0/.playwright/node/*/node

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pwsh tests/SchaerbeekMunicipality.E2E.Tests/bin/Release/net10.0/playwright.ps1 install chromium --with-deps

      - name: Install Playwright OS deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pwsh tests/SchaerbeekMunicipality.E2E.Tests/bin/Release/net10.0/playwright.ps1 install-deps chromium

      - name: E2E tests
        run: >
          dotnet test tests/SchaerbeekMunicipality.E2E.Tests
          --no-build
          --configuration Release
          --filter "Category=E2E"
          --verbosity normal
